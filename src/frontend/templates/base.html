<!doctype html>
<html lang="ru" data-theme="night" data-asset-version="{{ asset_version }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}ImmersJP{% endblock %}</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', path='css/core/index.css') }}?v={{ asset_version }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/forms/index.css') }}?v={{ asset_version }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/learn/index.css') }}?v={{ asset_version }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/plan/index.css') }}?v={{ asset_version }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/profile/index.css') }}?v={{ asset_version }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/responsive/index.css') }}?v={{ asset_version }}" />
    <script type="module" src="{{ url_for('static', path='js/index.js') }}?v={{ asset_version }}"></script>
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="site-backdrop" aria-hidden="true">
      <span class="site-backdrop__orb site-backdrop__orb--alpha"></span>
      <span class="site-backdrop__orb site-backdrop__orb--beta"></span>
      <span class="site-backdrop__orb site-backdrop__orb--gamma"></span>
      <span class="site-backdrop__grid"></span>
    </div>

    <div class="site-frame">
      {% include "partials/site_header.html" %}

      <main class="site-main">
        <div class="site-main__inner">
          {% include "partials/flash_stack.html" %}
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
