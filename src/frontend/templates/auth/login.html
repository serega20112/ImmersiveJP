{% extends "base.html" %}

{% block title %}Вход - ImmersJP{% endblock %}
{% block content %}
<section class="form-layout reveal">
    <div class="form-intro">
        <p class="eyebrow">С возвращением</p>
        <h1>Войди и продолжи погружение.</h1>
        <p>После входа ты попадаешь прямо в свой маршрут: dashboard, текущие карточки и советы по прогрессу.</p>
    </div>
    <form action="/auth/login" method="post" class="form-card">
        <label>
            <span>Email</span>
            <input type="email" name="email" required>
        </label>
        <label>
            <span>Пароль</span>
            <input type="password" name="password" required>
        </label>
        <button type="submit" class="primary-button">Войти</button>
        <p class="form-note">Нет аккаунта? <a href="/auth/register">Регистрация</a>.</p>
    </form>
</section>
{% endblock %}
