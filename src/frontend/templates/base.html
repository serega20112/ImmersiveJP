<!DOCTYPE html>
<html lang="ru" data-theme="paper">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ImmersJP{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
    <script defer src="{{ url_for('static', path='js/app.js') }}"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
<div class="page-shell"></div>
<header class="site-header">
    <a href="/" class="brand-mark">
        <span class="brand-mark__kanji">浸</span>
        <span class="brand-mark__text">ImmersJP</span>
    </a>
    <nav class="site-nav">
        {% if current_user %}
            <a href="/dashboard">Dashboard</a>
            <a href="/profile">Profile</a>
            <form action="/auth/logout" method="post">
                <button type="submit" class="ghost-button">Выйти</button>
            </form>
        {% else %}
            <a href="/auth/login">Вход</a>
            <a href="/auth/register" class="accent-link">Регистрация</a>
        {% endif %}
        <button type="button" class="theme-toggle ghost-button" data-theme-toggle>Тема</button>
    </nav>
</header>

<main class="site-main">
    {% if flash_messages %}
        <section class="flash-stack">
            {% for flash in flash_messages %}
                <div class="flash flash--{{ flash.category }}">{{ flash.message }}</div>
            {% endfor %}
        </section>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
